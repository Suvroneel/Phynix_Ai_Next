<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>Logging in...</title>
  <style>
    body { font-family: 'Inter', sans-serif; display: flex; align-items: center;
           justify-content: center; height: 100vh; background: #fafafa; }
    .msg { text-align: center; color: #666; }
    .spinner { width: 32px; height: 32px; border: 3px solid #eee;
               border-top-color: #ff914d; border-radius: 50%;
               animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="msg">
  <div class="spinner"></div>
  <p>Completing login...</p>
</div>

<script>
  // Supabase puts tokens in the URL fragment (#access_token=...&refresh_token=...)
  (async function() {
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const access_token = params.get("access_token");
    const refresh_token = params.get("refresh_token");

    if (!access_token) {
      window.location.href = "/accounts/login/?error=oauth_failed";
      return;
    }

    try {
      const resp = await fetch("/accounts/oauth-session/", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": getCsrf(),
        },
        body: JSON.stringify({ access_token, refresh_token }),
      });
      const data = await resp.json();
      if (data.ok) {
        window.location.href = "/home/";
      } else {
        window.location.href = "/accounts/login/?error=" + (data.error || "unknown");
      }
    } catch(e) {
      window.location.href = "/accounts/login/?error=network";
    }
  })();

  function getCsrf() {
    const c = document.cookie.split(";").map(s => s.trim()).find(s => s.startsWith("csrftoken="));
    return c ? c.split("=")[1] : "";
  }
</script>
</body>
</html>
